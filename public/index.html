<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Futurology Global Therapists — Psychotherapy EHR Dashboard">
  <title>Futurology EHR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">
          <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2"/><path d="M16 20c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M24 28v8M20 32h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <h1>Futurology Global</h1>
        <p>Psychotherapy EHR System</p>
      </div>
      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="dr.iredia@futurologyglobal.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
        <p class="login-error" id="login-error"></p>
      </form>
    </div>
  </div>

  <!-- App Shell (hidden until login) -->
  <div id="app-shell" class="app-shell hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="16" stroke="currentColor" stroke-width="1.5"/><path d="M12 15c0-3.3 2.7-6 6-6s6 2.7 6 6-2.7 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M18 21v6M15 24h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <span class="brand-text">Futurology</span>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Therapist/Admin nav -->
        <div id="nav-therapist" class="nav-section">
          <a href="#/dashboard" class="nav-link" data-page="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
            <span>Dashboard</span>
          </a>
          <a href="#/clients" class="nav-link" data-page="clients">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="4"/><path d="M2 21v-2a4 4 0 014-4h6a4 4 0 014 4v2"/><circle cx="19" cy="7" r="3"/><path d="M19 15a4 4 0 013 4v2"/></svg>
            <span>Clients</span>
          </a>
          <a href="#/calendar" class="nav-link" data-page="calendar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span>Calendar</span>
          </a>
          <a href="#/notes" class="nav-link" data-page="notes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
            <span>Session Notes</span>
          </a>
          <a href="#/plans" class="nav-link" data-page="plans">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            <span>Treatment Plans</span>
          </a>
          <a href="#/billing" class="nav-link" data-page="billing">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>
            <span>Billing</span>
          </a>
        </div>
        <!-- Client nav -->
        <div id="nav-client" class="nav-section hidden">
          <a href="#/portal" class="nav-link" data-page="portal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
            <span>My Portal</span>
          </a>
          <a href="#/portal/appointments" class="nav-link" data-page="portal-appointments">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span>My Appointments</span>
          </a>
          <a href="#/portal/messages" class="nav-link" data-page="portal-messages">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            <span>Messages</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info" id="user-info">
          <div class="user-avatar" id="user-avatar">DI</div>
          <div class="user-details">
            <span class="user-name" id="user-name">Dr. Iredia</span>
            <span class="user-role" id="user-role">Admin</span>
          </div>
        </div>
        <button class="btn-icon" id="logout-btn" title="Logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </aside>

    <!-- Mobile Hamburger -->
    <button class="mobile-menu-btn" id="mobile-menu-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar" id="topbar">
        <div>
          <h2 class="page-title" id="page-title">Dashboard</h2>
          <p class="page-subtitle" id="page-subtitle">Welcome back</p>
        </div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>
      <div class="content-area" id="content-area">
        <!-- Pages rendered here by router -->
      </div>
    </main>
  </div>

  <!-- Modal Container -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Modal</h3>
        <button class="btn-icon modal-close" id="modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/noteEditor.js"></script>
  <script src="/js/pages/login.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/clients.js"></script>
  <script src="/js/pages/calendar.js"></script>
  <script src="/js/pages/notes.js"></script>
  <script src="/js/pages/plans.js"></script>
  <script src="/js/pages/portal.js"></script>
  <script src="/js/pages/billing.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
